        .modal-overlay { backdrop-filter: blur(4px); transition: opacity 0.3s ease; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .modal-content { background: white; width: 100%; max-height: 90vh; overflow-y: auto; border-radius: 1.5rem; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); animation: slideUp 0.4s ease-out; }

            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);

        #custom-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

<body class="font-sans antialiased">

    <div id="custom-toast"></div>

    <header class="bg-gradient-to-b from-mori-forest to-mori-sage text-white text-center shadow-md relative py-4">
        <h1 class="text-2xl md:text-3xl font-bold tracking-wide drop-shadow-md">探探里山 - 永續任務</h1>

    <main class="container mx-auto p-4 md:p-8 relative z-20">

        <div class="fixed bottom-6 left-6 md:bottom-8 md:left-8 z-[90] flex flex-col items-start gap-2">
            <button onclick="window.location.href='index.html'" class="px-4 py-2 bg-yellow-400 text-yellow-900 rounded-full shadow-[0_8px_25px_rgba(250,204,21,0.5)] border-2 border-yellow-300 hover:bg-yellow-500 hover:shadow-yellow-500/50 hover:-translate-y-1 text-sm md:text-base font-black transition-all duration-300 flex items-center group w-fit tracking-wide">

                <i class="fas fa-user-circle text-mori-sage mr-2 text-lg"></i>
                <span id="display-player-name" class="mr-2">旅者</span>
                <span id="display-player-code" class="font-mono text-mori-wood bg-mori-base px-2 py-0.5 rounded text-sm border border-mori-light">...</span>

            <button onclick="window.location.href='index.html'" class="px-4 py-2 bg-white text-mori-forest rounded-full hover:bg-mori-light font-bold text-xs transition shadow-sm border border-mori-sage/30 flex items-center">

                        <p class="text-mori-dark font-bold text-sm" id="map-loading-text">地圖準備中...</p>
                    </div>
                </div>
                 <!-- 計算足跡與按鈕區塊 -->
                 <div class="bg-white p-4 rounded-xl shadow-md border-l-4 border-mori-sage sticky bottom-0 z-50">

                </div>

                        <span class="text-[15px]"><i class="fas fa-map-marked-alt mr-2"></i>跨縣市往返設定</span>

                            <div class="flex gap-2 mt-1">

                                <button id="set-city-end-btn" class="flex-1 py-2 bg-blue-600 text-white rounded-lg font-bold text-sm transition hover:bg-blue-700">設為終點</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 市區短距移動 -->

                        <i class="fas fa-chevron-down transition-transform duration-300"></i>
                    </button>
                    <div class="accordion-content p-4 pt-2 hidden">

                        <button id="confirm-short-dist-btn" class="hidden w-full py-2 bg-yellow-500 text-white rounded-lg font-bold text-sm shadow animate-bounce">確認並獲取積分</button>
                    </div>
                </div>
                
                <!-- 實體任務與驗證 -->
                <div class="accordion-item shrink-0 bg-purple-50/50 rounded-xl shadow-sm border border-purple-100 overflow-hidden">
                    <button class="accordion-header w-full p-4 font-bold text-purple-800 flex justify-between items-center text-left focus:outline-none hover:bg-purple-100/50 transition">

                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- POI Modal -->
    <div id="poi-modal" class="modal-overlay hidden">
        <div class="modal-content bg-white w-full max-w-md rounded-2xl shadow-2xl relative max-h-[90vh] overflow-y-auto">

            <button class="close-button absolute top-4 right-4 text-gray-400 hover:text-gray-600 z-10"><i class="fas fa-times text-xl"></i></button>
            <div class="mb-4 flex justify-center"><div class="w-14 h-14 bg-green-50 rounded-full flex items-center justify-center shadow-inner"><i class="fas fa-shield-alt text-2xl text-mori-forest"></i></div></div>

        const LOCAL_STORAGE_KEY = 'shuilMoriData_v3.0';

        async function addToGlobalTotal(carbonDelta, greenDelta) {
            const todayStr = getTodayKey();
            if (!isOfflineMode && db) {

                } catch(e) {} 
            }
        }

            state.totalScore += Math.round(carbon / 10);
            
            addToGlobalTotal(carbon, 0); // 非同步寫入雲端
            window.addLog(`完成旅程: ${distKm.toFixed(1)}km, 獲得減碳 ${carbon}g`);
            saveData(); // 立即儲存本機進度
            
            window.showToast('✅ 積分與減碳量已記錄！正在返回首頁結算...');
            // 無縫折返回首頁
            setTimeout(() => { window.location.href = 'index.html'; }, 1500);

        // 事件綁定
        function bindAccordions() {
            const accordions = document.querySelectorAll('.accordion-header');
            accordions.forEach(header => {
                header.addEventListener('click', () => {
                    const content = header.nextElementSibling;
                    const icon = header.querySelector('.fa-chevron-down');
                    const isCurrentlyHidden = content ? content.classList.contains('hidden') : false;

                    accordions.forEach(otherHeader => {
                        const otherContent = otherHeader.nextElementSibling;
                        const otherIcon = otherHeader.querySelector('.fa-chevron-down');
                        if (otherContent && otherContent !== content) {
                            otherContent.classList.add('hidden');
                            if (otherIcon) otherIcon.style.transform = 'rotate(0deg)';
                        }
                    });

                    if (content) {
                        if (isCurrentlyHidden) { content.classList.remove('hidden'); if (icon) icon.style.transform = 'rotate(180deg)'; } 
                        else { content.classList.add('hidden'); if (icon) icon.style.transform = 'rotate(0deg)'; }
                    }
                });
            });
        }

                btn.addEventListener('click', (e) => {
                    const modal = e.currentTarget.closest('.modal-overlay');
                    if (modal) window.closeModal(modal.id);
                });
            });

            // 🚀 綁定儲存暱稱事件 (寫入 localStorage 並同步畫面)
            document.getElementById('save-profile-btn')?.addEventListener('click', () => {
                const newName = document.getElementById('edit-player-name').value.trim();
                if (newName) {
                    state.playerName = newName;
                    saveData();
                    renderDashboard(); // 同步刷新顯示
                    window.showToast('✅ 帳號名稱已更新！');
                } else {
                    window.showToast('暱稱不能為空');
                }
            });

            document.getElementById('set-as-start-button')?.addEventListener('click', () => {
                if(currentModalPoi) { selectedStart = currentModalPoi; window.closeModal('poi-modal'); window.showToast('已設為起點'); updateTripDisplay(); }
            });
            document.getElementById('set-as-end-button')?.addEventListener('click', () => {
                if(currentModalPoi) { selectedEnd = currentModalPoi; window.closeModal('poi-modal'); window.showToast('已設為終點'); updateTripDisplay(); }
            });

            document.getElementById('set-city-start-btn')?.addEventListener('click', () => {
                const select = document.getElementById('city-select');
                if (!select || !select.value) return window.showToast('請先選擇縣市');
                const city = taiwanCities.find(c => c.name === select.value);
                if (city) { selectedStart = { coords: { lat: city.lat, lng: city.lng }, name: city.name }; window.showToast(`已將 ${city.name} 設為起點`); updateTripDisplay(); }
            });

            document.getElementById('set-city-end-btn')?.addEventListener('click', () => {
                const select = document.getElementById('city-select');
                if (!select || !select.value) return window.showToast('請先選擇縣市');
                const city = taiwanCities.find(c => c.name === select.value);
                if (city) { selectedEnd = { coords: { lat: city.lat, lng: city.lng }, name: city.name }; window.showToast(`已將 ${city.name} 設為終點`); updateTripDisplay(); }
            });

            document.getElementById('submit-activity-log')?.addEventListener('click', () => {
                const code = document.getElementById('verification-code-input')?.value;
                if (!code) return window.showToast('請輸入通關代碼');
                window.addLog(`完成實體任務驗證 (代碼: ${code})`);
                state.totalScore += 50; saveData();
                window.showToast('✅ 驗證成功！獲得 50 積分，即將返回首頁...');
                document.getElementById('verification-code-input').value = '';
                setTimeout(() => { window.location.href = 'index.html'; }, 1500);
            });

            document.getElementById('log-action-button')?.addEventListener('click', () => {
                const logInput = document.getElementById('sustainable-action-log');
                if (!logInput || !logInput.value.trim()) return window.showToast('請輸入心得內容');
                window.addLog(`記錄心得: ${logInput.value.substring(0, 15)}...`);
                state.totalScore += 10; saveData();
                window.showToast('✅ 心得已記錄！獲得 10 積分，即將返回首頁...');
                logInput.value = '';
                setTimeout(() => { window.location.href = 'index.html'; }, 1500);
            });

            document.querySelectorAll('.short-dist-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const km = parseFloat(e.target.dataset.km);
                    const reduction = Math.round(km * (transportData[state.currentTransport].reduction || 0));
                    document.getElementById('short-dist-result').textContent = `預估減碳: ${reduction}g`;
                    pendingTrip = { distKm: km, reduction: reduction, isValid: true };
                    document.getElementById('confirm-short-dist-btn').classList.remove('hidden');
                });
            });

            document.getElementById('confirm-short-dist-btn')?.addEventListener('click', () => {
                if(pendingTrip.isValid) { 
                    const codeInput = document.getElementById('reward-verify-code');
                    if (codeInput) codeInput.value = '';
                    window.openModal('reward-verification-modal'); 
                    document.getElementById('confirm-short-dist-btn').classList.add('hidden'); 
                    document.getElementById('short-dist-result').textContent = ''; 
                }
            });

            document.getElementById('confirm-trip-button')?.addEventListener('click', () => {
                if(pendingTrip.isValid) { window.openModal('reward-verification-modal'); document.getElementById('confirm-trip-button').classList.add('hidden'); }
            });
            document.getElementById('reward-verify-full-btn')?.addEventListener('click', () => {
                const code = document.getElementById('reward-verify-code').value;
                if(code.length > 0) { window.closeModal('reward-verification-modal'); processTripCompletion(pendingTrip.distKm, pendingTrip.reduction); } 
                else { window.showToast('請輸入密碼'); }
            });
            document.getElementById('reward-verify-tenth-btn')?.addEventListener('click', () => {
                window.closeModal('reward-verification-modal'); processTripCompletion(pendingTrip.distKm, Math.round(pendingTrip.reduction / 10)); 
            });

            // Directions API 真實道路計算與預覽
            document.getElementById('preview-trip-button')?.addEventListener('click', () => {
                const status = document.getElementById('trip-calculation-status'), confirmBtn = document.getElementById('confirm-trip-button');
                if(confirmBtn) confirmBtn.classList.add('hidden'); pendingTrip.isValid = false;
                if(!selectedStart || !selectedEnd) return window.showToast('請選擇起點與終點');
                if(!selectedStart.coords || !selectedEnd.coords) return window.showToast('所選地點缺乏座標資訊，無法計算');
                if(!window.directionsService) { if(status) status.textContent = "地圖 API 載入中，請稍後..."; return; }
                if(status) status.textContent = "計算中..."; const tData = transportData[state.currentTransport];
                if(window.fallbackPolyline) window.fallbackPolyline.setMap(null); window.directionsRenderer.setMap(window.mapInstance);

                window.directionsService.route({ origin: selectedStart.coords, destination: selectedEnd.coords, travelMode: google.maps.TravelMode[tData.mode] || 'DRIVING' }, (result, stat) => {
                    if(stat === 'OK') {
                        window.directionsRenderer.setDirections(result); let distMeters = result.routes[0].legs[0].distance.value;
                        const distKm = distMeters / 1000; const reduction = Math.round(distKm * (tData.reduction / 10)); 
                        pendingTrip = { distMeters, distKm, reduction, isValid: true };
                        if(status) status.innerHTML = `路網距離 ${distKm.toFixed(1)}km | 預估減碳: <span class="text-mori-forest">${reduction}g</span>`;
                        if(confirmBtn) confirmBtn.classList.remove('hidden'); document.getElementById('preview-trip-button')?.classList.add('hidden');
                    } else {
                        window.directionsRenderer.setMap(null); const p1 = new google.maps.LatLng(selectedStart.coords.lat, selectedStart.coords.lng); const p2 = new google.maps.LatLng(selectedEnd.coords.lat, selectedEnd.coords.lng);
                        const distMeters = google.maps.geometry.spherical.computeDistanceBetween(p1, p2); const distKm = distMeters / 1000; const reduction = Math.round(distKm * (tData.reduction / 10)); 
                        window.fallbackPolyline = new google.maps.Polyline({ path: [p1, p2], geodesic: true, strokeColor: '#4A6741', strokeOpacity: 0.8, strokeWeight: 4, map: window.mapInstance });
                        const bounds = new google.maps.LatLngBounds(); bounds.extend(p1); bounds.extend(p2); window.mapInstance.fitBounds(bounds);
                        pendingTrip = { distMeters, distKm, reduction, isValid: true };
                        if(status) status.innerHTML = `<i class="fas fa-magic text-yellow-500 mr-1"></i>(直線估算) ${distKm.toFixed(1)}km | 減碳 <span class="text-mori-forest">${reduction}g</span>`;
                        if(confirmBtn) confirmBtn.classList.remove('hidden'); document.getElementById('preview-trip-button')?.classList.add('hidden');
                    }
                });
            });
        }

        // 地圖渲染
        function renderMap() {
            if (!window.google || mapInitialized) return;
            const mapEl = document.getElementById('map');
            if(!mapEl || mapEl.offsetWidth === 0) { setTimeout(renderMap, 100); return; }
            try {
                window.mapInstance = new google.maps.Map(mapEl, { center: { lat: 23.810, lng: 120.850 }, zoom: 13, mapTypeControl: false, streetViewControl: false });
                window.directionsService = new google.maps.DirectionsService(); 
                window.directionsRenderer = new google.maps.DirectionsRenderer({ map: window.mapInstance });
                
                pois.forEach(poi => {
                    let markerOpts = { position: poi.coords, map: window.mapInstance, title: poi.name, label: { text: poi.icon, fontSize: '20px' } };
                    if (poi.categoryId === 'map_only') { markerOpts.icon = 'http://maps.google.com/mapfiles/ms/icons/green-dot.png'; delete markerOpts.label; } 
                    else if (poi.categoryId === 'map_only_blue') { markerOpts.icon = 'http://maps.google.com/mapfiles/ms/icons/blue-dot.png'; delete markerOpts.label; }
                    const marker = new google.maps.Marker(markerOpts); marker.addListener('click', () => window.openPoi(poi));
                });
                document.getElementById('map-overlay')?.classList.add('hidden'); mapInitialized = true;
            } catch(e) { console.error("地圖錯誤:", e); document.getElementById('map-loading-text').textContent = "地圖載入失敗，請重整網頁"; }
        }

        const loadGoogleMaps = () => {
            if(document.querySelector('script[src*="maps.googleapis.com"]')) return;
            const script = document.createElement('script'); 
            const encodedKey = 'QUl6YVN5QWpOdjQ5QlBhX1gyU1N3aHR5SFR1eWZqTUFieEVHVS04';
            script.src = `https://maps.googleapis.com/maps/api/js?key=${atob(encodedKey)}&libraries=geometry,routes&callback=initMap`; 
            script.async = true; script.defer = true; 
            script.onerror = () => { document.getElementById('map-loading-text').textContent = '地圖服務連線異常，請檢查網路'; }; 
            document.head.appendChild(script);
        };
        window.initMap = function() { window.mapsApiReady = true; renderMap(); };

        // 系統啟動
        document.addEventListener('DOMContentLoaded', () => {
            loadLocalData();
            
            if (!state.currentTransport || !transportData[state.currentTransport]) {
                window.showToast('尚未選擇交通方式，預設為「單人自駕」以供瀏覽。');
                state.currentTransport = 'drive_alone'; 
                saveData(); 
            }
            
            const tData = transportData[state.currentTransport];
            const transportDisplay = document.getElementById('current-transport-display-mission');
            if(transportDisplay) {
                transportDisplay.innerHTML = `<i class="fas fa-info-circle mr-1.5 opacity-80"></i>交通方式: ${tData.name}`;
            }

            renderPoiList();
            renderCityOptions();
            bindAccordions();
            bindEvents();
            loadGoogleMaps();

            try {
                const app = initializeApp(firebaseConfig); db = getFirestore(app); auth = getAuth(app);
                signInAnonymously(auth).catch(() => { isOfflineMode = true; });
                onAuthStateChanged(auth, user => { if(!user) isOfflineMode = true; });
            } catch (e) { isOfflineMode = true; }
        });
    </script>
</body>
</html>
